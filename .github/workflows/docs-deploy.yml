name: Deploy to alex-migwi.github.io/clarity-docs

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        pnpm-version: [10.12.4]
    steps:
      - name: Checkout source repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ matrix.pnpm-version }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build project
        run: pnpm build
        env:
          PUBLIC_SITE_NAME: ${{ vars.PUBLIC_SITE_NAME || 'Clarity' }}
          PUBLIC_SITE_DESCRIPTION: ${{ vars.PUBLIC_SITE_DESCRIPTION || 'A premium documentation platform for teams' }}
          PUBLIC_SITE_URL: ${{ vars.PUBLIC_SITE_URL || 'https://alex-migwi.github.io/clarity-docs' }}
          PUBLIC_BASE_PATH: ${{ vars.PUBLIC_BASE_PATH || '/clarity-docs/' }}
          PUBLIC_GITHUB_REPO: ${{ vars.PUBLIC_GITHUB_REPO || 'alex-migwi/clarity' }}
          PUBLIC_GITHUB_BRANCH: ${{ vars.PUBLIC_GITHUB_BRANCH || 'main' }}
          PUBLIC_GITHUB_DOCS_PATH: ${{ vars.PUBLIC_GITHUB_DOCS_PATH || 'src/content/docs' }}
          PUBLIC_BACKEND_URL: ${{ vars.PUBLIC_BACKEND_URL || '' }}

      - name: Deploy to alex-migwi.github.io/clarity-docs
        uses: peaceiris/actions-gh-pages@v3
        with:
          personal_token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          publish_dir: ./dist
          publish_branch: main
          force_orphan: true
          external_repository: alex-migwi/clarity-docs #replace with your own repo when you clone